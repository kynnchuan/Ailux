server:
  port: 8080

spring:
  application:
    name: ailux-backend-sample
  datasource:
    url: jdbc:h2:mem:ailux
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

ailux:
  providers:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      default-model: ${OPENAI_MODEL:gpt-4o}
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      default-model: ${DEEPSEEK_MODEL:deepseek-chat}
  context:
    max-messages: 20
