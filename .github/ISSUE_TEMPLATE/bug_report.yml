name: Bug report
description: Report a reproducible problem in Ailux
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Please remove API keys, prompts, responses, and any private data before submitting.**

        > 💡 **Tip — paste a redacted diagnostic instead of hand-typing your environment**:
        >
        > ```kotlin
        > val report = Ailux.createDiagnosticReport()
        > clipboard.setPrimaryClip(ClipData.newPlainText("ailux", report?.toShareableText() ?: ""))
        > ```
        >
        > `DiagnosticReport.toShareableText()` is **redaction-safe by contract** — it never contains prompts, responses, `overrides`, or credentials. See the [logging policy](../../docs/LOGGING.md) for details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure provider...
        2. Send request...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostic
    attributes:
      label: Diagnostic report (recommended)
      description: |
        Paste the output of `Ailux.createDiagnosticReport()?.toShareableText()`. This is the preferred way to share environment + last-error context — it is guaranteed redacted.
      render: text
      placeholder: |
        Ailux Diagnostic Report
        - sdkVersion: 0.2.5
        - androidVersion: 14
        - deviceModel: Pixel 8
        - abi: arm64-v8a
        - providerType: BackendProxyProvider
        - requestId: 4f1c…
        - errorCode: RATE_LIMITED
        - ttftMs: 1820
        - totalDurationMs: 9300
        - retryCount: 2
        - cancelled: false
  - type: textarea
    id: environment
    attributes:
      label: Environment (only if you cannot run the diagnostic above)
      placeholder: |
        Ailux version:
        Android version:
        Device / emulator:
        Provider: MockProvider / BackendProxyProvider
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Additional logs
      description: |
        Paste **redacted** logs only. Do **not** include API keys, full prompts, full model responses, or `overrides` content. If your `PrivacyConfig` is left at defaults, the SDK already redacts these channels for you.
      render: text
