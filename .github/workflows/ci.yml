name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  android:
    name: Android library checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all SDK modules
        run: ./gradlew :ailux-core:compileDebugKotlin :ailux-api:compileDebugKotlin :ailux-android:compileDebugKotlin :ailux-provider-backend:compileDebugKotlin :ailux-provider-mock:compileDebugKotlin

      - name: Run unit tests (all SDK modules)
        run: ./gradlew :ailux-core:testDebugUnitTest :ailux-api:testDebugUnitTest :ailux-android:testDebugUnitTest :ailux-provider-backend:testDebugUnitTest :ailux-provider-mock:testDebugUnitTest

      - name: Verify Maven publication produces artifacts
        run: ./gradlew publishMavenPublicationToProjectLocalRepository -Psigning.enabled=false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
