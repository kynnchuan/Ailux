name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    name: Android library checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run MockProvider unit tests
        run: ./gradlew :ailux-provider-mock:testDebugUnitTest

      - name: Compile SDK modules
        run: ./gradlew :ailux-core:compileDebugKotlin :ailux-api:compileDebugKotlin :ailux-android:compileDebugKotlin :ailux-provider-backend:compileDebugKotlin :ailux-provider-mock:compileDebugKotlin
